resourceType: StructureDefinition
id: us-core-flag
url: http://hl7.org/fhir/us/core/StructureDefinition/us-core-flag
version: 8.0.0-ballot
name: USCoreFlag
title: US Core Flag Profile
status: active
experimental: false
date: '2026-05-12'
publisher: HL7 International / Cross-Group Projects
contact:
  - name: HL7 International / Cross-Group Projects
    telecom:
      - system: url
        value: http://www.hl7.org/Special/committees/cgp
      - system: email
        value: cgp@lists.HL7.org
description: >-
  The US Core Flag Profile inherits from the FHIR Flag resource; refer to it
  for scope and usage definitions. This profile sets minimum expectations for
  the Flag resource to record, search, and fetch a patient's reasonable
  accommodations and other patient-related alerts. It identifies which core
  elements, extensions, vocabularies, and value sets SHALL be present in the
  resource when using this profile, and constrains the way those elements are
  used.
jurisdiction:
  - coding:
      - system: urn:iso:std:iso:3166
        code: US
        display: United States of America
fhirVersion: 4.0.1
kind: resource
abstract: false
type: Flag
baseDefinition: http://hl7.org/fhir/StructureDefinition/Flag
derivation: constraint
differential:
  element:

    - id: Flag
      path: Flag

    - id: Flag.status
      path: Flag.status
      mustSupport: true

    - id: Flag.category
      path: Flag.category
      slicing:
        discriminator:
          - type: value
            path: $this
        ordered: false
        rules: open
      mustSupport: true

    - id: Flag.category:accommodation
      path: Flag.category
      extension:
        - url: http://hl7.org/fhir/us/core/StructureDefinition/uscdi-requirement
          valueBoolean: true
      sliceName: accommodation
      short: "𝗔𝗗𝗗𝗜𝗧𝗜𝗢𝗡𝗔𝗟 𝗨𝗦𝗖𝗗𝗜: Reasonable accommodation category"
      min: 0
      max: '1'
      patternCodeableConcept:
        coding:
          - system: http://hl7.org/fhir/us/core/CodeSystem/us-core-category
            code: accommodation

    - id: Flag.code
      path: Flag.code
      mustSupport: true
      binding:
        strength: extensible
        valueSet: http://cts.nlm.nih.gov/fhir/ValueSet/2.16.840.1.113762.1.4.1234.567
        description: "USCDI applicable vocabulary standard: SNOMED CT"

    - id: Flag.code.text
      path: Flag.code.text
      # comment: >-
      #   Supports free-text accommodation descriptions — bespoke or one-off
      #   adjustments that do not fit a coded concept from the DEC value set.
      #   Implementers SHOULD populate text whenever the accommodation cannot
      #   be fully expressed by a coding, and MAY populate it alongside a
      #   coding to preserve the original wording captured at the point of
      #   recording.
      min: 0
      max: '1'
      mustSupport: true

    - id: Flag.subject
      path: Flag.subject
      # comment: >-
      #   Target list preserves the full FHIR base set
      #   (Patient | Location | Group | Organization | Practitioner |
      #   PlanDefinition | Medication | Procedure). Where US Core publishes a
      #   profile for a given resource type, the targetProfile is re-bound to
      #   that US Core profile; Group and PlanDefinition fall back to the
      #   base FHIR resource because US Core does not publish profiles for
      #   them.
      mustSupport: true
      type:
        - code: Reference
          targetProfile:
            - http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient
            - http://hl7.org/fhir/us/core/StructureDefinition/us-core-location
            - http://hl7.org/fhir/StructureDefinition/Group
            - http://hl7.org/fhir/us/core/StructureDefinition/us-core-organization
            - http://hl7.org/fhir/us/core/StructureDefinition/us-core-practitioner
            - http://hl7.org/fhir/StructureDefinition/PlanDefinition
            - http://hl7.org/fhir/us/core/StructureDefinition/us-core-medication
            - http://hl7.org/fhir/us/core/StructureDefinition/us-core-procedure
#============= Update when version named in regs ====================
extension:
  - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-fmm
    valueInteger: 3
#======================================================================
