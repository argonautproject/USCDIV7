url: http://hl7.org/fhir/us/core/StructureDefinition/us-core-accommodation
name: USCoreAccommodationExtension
title: US Core Accommodation Extension
status: active
date: '2026-05-12'
description: >-
  This extension records modifications, tools, technologies, and other supports
  necessary to enable a patient or other individual to access care, captured as
  a free-text annotation. Examples include sign language interpreters,
  wheelchair accessibility requirements, and sensory accommodation.

kind: complex-type
abstract: false
