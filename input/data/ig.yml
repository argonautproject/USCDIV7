  resource:
    - reference:
        reference: Appointment/appt-from-referral
      description: This example of a *US Core Appointment Profile* illustrates a booked appointment created in response to a referral ServiceRequest.
      name: Appointment From Referral Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-appointment
      groupingId: Appointment
    - reference:
        reference: Appointment/appt-resulted-encounter
      description: This example of a *US Core Appointment Profile* illustrates a fulfilled appointment paired with the resulting Encounter that references it via `Encounter.appointment`.
      name: Appointment Resulting In An Encounter Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-appointment
      groupingId: Appointment
    - reference:
        reference: Flag/flag-asl-interpreter
      description: This example of a *US Core Flag Profile* illustrates a patient accommodation indicating that an American Sign Language (ASL) interpreter is needed at the point of care.
      name: ASL Interpreter Accommodation Flag Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-flag
      groupingId: Flag
    - reference:
        reference: Observation/accommodation-asl
      description: This example of a *US Core Observation Patient Accommodation Profile* records that the patient requires an American Sign Language (ASL) interpreter at the point of care.
      name: ASL Interpreter Accommodation Observation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-observation-accommodation
      groupingId: Observation
    - reference:
        reference: Observation/simple-accommodation-asl
      description: This example of a *US Core Simple Observation Profile* records that the patient requires an American Sign Language (ASL) interpreter at the point of care.
      name: ASL Interpreter Accommodation Simple Observation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-simple-observation
      groupingId: Observation
    - reference:
        reference: Appointment/appt-booked-physical
      description: This is a booked future annual physical exam appointment example for the *US Core Appointment Profile*.
      name: Booked Future Appointment Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-appointment
      groupingId: Appointment
    - reference:
        reference: Appointment/appt-cancelled
      description: This is a cancelled office visit appointment example for the *US Core Appointment Profile*.
      name: Cancelled Appointment Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-appointment
      groupingId: Appointment
    - reference:
        reference: DeviceRequest/devicerequest-cgm
      description: This is an example order for a continuous glucose monitor for a patient with diabetes using the *US Core DeviceRequest Profile*.
      name: DeviceRequest Continuous Glucose Monitor Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-devicerequest
      groupingId: DeviceRequest
    - reference:
        reference: DeviceRequest/devicerequest-cpap
      description: This is an example order for a continuous positive airway pressure (CPAP) device for a patient with obstructive sleep apnea using the *US Core DeviceRequest Profile*.
      name: DeviceRequest CPAP Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-devicerequest
      groupingId: DeviceRequest
    - reference:
        reference: DeviceRequest/devicerequest-hearing-aid
      description: This is an example order for a hearing aid for a patient with sensorineural hearing loss using the *US Core DeviceRequest Profile*.
      name: DeviceRequest Hearing Aid Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-devicerequest
      groupingId: DeviceRequest
    - reference:
        reference: DeviceRequest/devicerequest-home-oxygen
      description: This is an example order for a home oxygen concentrator for a patient with chronic obstructive pulmonary disease using the *US Core DeviceRequest Profile*.
      name: DeviceRequest Home Oxygen Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-devicerequest
      groupingId: DeviceRequest
    - reference:
        reference: DeviceRequest/devicerequest-insulin-pump
      description: This is an example order for an insulin pump for a patient with type 1 diabetes using the *US Core DeviceRequest Profile*.
      name: DeviceRequest Insulin Pump Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-devicerequest
      groupingId: DeviceRequest
    - reference:
        reference: DeviceRequest/devicerequest-wheelchair
      description: This is an example order for a manual wheelchair as durable medical equipment using the *US Core DeviceRequest Profile*.
      name: DeviceRequest Wheelchair Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-devicerequest
      groupingId: DeviceRequest
    - reference:
        reference: MedicationAdministration/dose-not-given
      description: This example of a *US Core MedicationAdministration Profile* records a scheduled morning dose of axid that was not administered because the patient refused.
      name: Dose Not Given - Patient Refused Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-medicationadministration
      groupingId: MedicationAdministration
    - reference:
        reference: Encounter/encounter-from-appointment
      description: This is an encounter example for the *US Core Encounter Profile* that records the visit resulting from a scheduled appointment, referenced via `Encounter.appointment`.
      name: Encounter From Appointment Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-encounter
      groupingId: Encounter
    - reference:
        reference: Parameters/exp-params
      exampleBoolean: false
      name: exp-params
    - reference:
        reference: CareTeam/careteam-healthcare-agent
      description: This example of a *US Core CareTeam Profile* identifies the patient's healthcare agent - a related person legally authorized to make healthcare decisions on behalf of the patient if the patient cannot communicate with medical personnel.
      name: Healthcare Agent CareTeam Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-careteam
      groupingId: CareTeam
    - reference:
        reference: MedicationAdministration/inprogress-vancomycin
      description: This example of a *US Core MedicationAdministration Profile* records an in-progress IV infusion of vancomycin 1 g over 90 minutes; the end time is open while the infusion runs.
      name: In-Progress Vancomycin Infusion Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-medicationadministration
      groupingId: MedicationAdministration
    - reference:
        reference: MedicationAdministration/inpatient-iv-cefazolin
      description: This example of a *US Core MedicationAdministration Profile* records a completed inpatient IV infusion of cefazolin 1 g given over 30 minutes by a registered nurse.
      name: Inpatient IV Cefazolin Administration Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-medicationadministration
      groupingId: MedicationAdministration
    - reference:
        reference: Appointment/appt-fulfilled-followup
      description: This is a fulfilled follow-up office visit appointment example for the *US Core Appointment Profile*.
      name: Office Visit Follow-up Appointment Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-appointment
      groupingId: Appointment
    - reference:
        reference: Patient/patient-accommodation-asl
      description: This example of a *US Core Patient Profile* illustrates the use of the US Core Accommodation Extension to record that the patient requires an American Sign Language (ASL) interpreter at the point of care.
      name: Patient With ASL Interpreter Accommodation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient
      groupingId: Patient
    - reference:
        reference: Patient/patient-healthcare-agent
      description: This example of a *US Core Patient Profile* illustrates the use of `Patient.contact` to record the patient's Healthcare Agent - the related person legally authorized to make healthcare decisions on behalf of the patient if the patient cannot do so.
      name: Patient With Healthcare Agent Contact Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient
      groupingId: Patient
    - reference:
        reference: Patient/patient-healthcare-agent-primary-first
      description: This example of a *US Core Patient Profile* illustrates the use of repeating `Patient.contact` elements to record both a primary Healthcare Agent and a first alternate Healthcare Agent for the patient.
      name: Patient With Primary And First Alternate Healthcare Agents Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient
      groupingId: Patient
    - reference:
        reference: Patient/patient-accommodation-service-animal
      description: This example of a *US Core Patient Profile* illustrates the use of the US Core Accommodation Extension to record that the patient's service animal must be permitted to accompany the patient within the facility.
      name: Patient With Service Animal Accommodation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient
      groupingId: Patient
    - reference:
        reference: Patient/patient-accommodation-wheelchair
      description: This example of a *US Core Patient Profile* illustrates the use of the US Core Accommodation Extension to record that the patient needs staff assistance with pushing a wheelchair during clinical encounters.
      name: Patient With Wheelchair Assistance Accommodation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-patient
      groupingId: Patient
    - reference:
        reference: CareTeam/careteam-healthcare-agents-primary-first
      description: This example of a *US Core CareTeam Profile* identifies the patient's primary healthcare agent and first alternate healthcare agent - related persons designated to make healthcare decisions on behalf of the patient if the patient cannot do so.
      name: Primary And First Alternate Healthcare Agents CareTeam Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-careteam
      groupingId: CareTeam
    - reference:
        reference: MedicationAdministration/prn-acetaminophen-given
      description: This example of a *US Core MedicationAdministration Profile* records a completed PRN oral dose of acetaminophen 650 mg given for pain.
      name: PRN Acetaminophen Administration Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-medicationadministration
      groupingId: MedicationAdministration
    - reference:
        reference: RelatedPerson/shaw-grandson-first-alternate
      description: This example of a *US Core RelatedPerson Profile* records the patient's grandson in the first alternate Healthcare Agent role.
      name: Related Person Grandson As First Alternate Healthcare Agent Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-relatedperson
      groupingId: RelatedPerson
    - reference:
        reference: RelatedPerson/shaw-niece-hpowatt
      description: This example of a *US Core RelatedPerson Profile* records the patient's niece in the legally authorized Healthcare Power of Attorney role.
      name: Related Person Niece As Healthcare Power Of Attorney Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-relatedperson
      groupingId: RelatedPerson
    - reference:
        reference: RelatedPerson/shaw-niece-primary-agent
      description: This example of a *US Core RelatedPerson Profile* records the patient's niece in the primary Healthcare Agent role.
      name: Related Person Niece As Primary Healthcare Agent Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-relatedperson
      groupingId: RelatedPerson
    - reference:
        reference: Flag/flag-service-animal
      description: This example of a *US Core Flag Profile* illustrates a patient accommodation indicating that a service animal must be permitted to accompany the patient within the facility.
      name: Service Animal Accommodation Flag Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-flag
      groupingId: Flag
    - reference:
        reference: Observation/accommodation-service-animal
      description: This example of a *US Core Observation Patient Accommodation Profile* records that the patient's service animal must be permitted to accompany the patient within the facility.
      name: Service Animal Accommodation Observation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-observation-accommodation
      groupingId: Observation
    - reference:
        reference: Observation/simple-accommodation-service-animal
      description: This example of a *US Core Simple Observation Profile* records that the patient's service animal must be permitted to accompany the patient within the facility.
      name: Service Animal Accommodation Simple Observation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-simple-observation
      groupingId: Observation
    - reference:
        reference: Appointment/appt-telehealth
      description: This is a booked telehealth consultation appointment example for the *US Core Appointment Profile*.
      name: Telehealth Appointment Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-appointment
      groupingId: Appointment
    - reference:
        reference: StructureDefinition/us-core-accommodation
      description: This extension records modifications, tools, technologies, and other supports necessary to enable a patient or other individual to access care, captured as a free-text annotation. Examples include sign language interpreters, wheelchair accessibility requirements, and sensory accommodation.
      exampleBoolean: false
      name: US Core Accommodation Extension
    - reference:
        reference: StructureDefinition/us-core-appointment
      description: The US Core Appointment Profile inherits from the FHIR [Appointment](https://hl7.org/fhir/R4/appointment.html) resource; refer to it for scope and usage definitions. This profile meets the requirements of the U.S. Core Data for Interoperability (USCDI) *Appointment Data Element of the Encounter Information Data Class*. It sets minimum expectations for the Appointment resource to record, search, and fetch information about a healthcare event scheduled for a past, current, or future date and time. It specifies which core elements, extensions, vocabularies, and value sets SHALL be present in the resource and constrains how the elements are used. Providing the floor for standards development for specific use cases promotes interoperability and adoption.
      exampleBoolean: false
      name: US Core Appointment Profile
    - reference:
        reference: StructureDefinition/us-core-devicerequest
      description: The US Core DeviceRequest Profile inherits from the FHIR [DeviceRequest](https://hl7.org/fhir/R4/devicerequest.html) resource; refer to it for scope and usage definitions. This profile meets the requirements of the U.S. Core Data for Interoperability (USCDI) *Medical Device Order Data Element of the Orders Data Class*. It sets minimum expectations for the DeviceRequest resource to record, search, and fetch orders for medical devices for a patient. It specifies which core elements, extensions, vocabularies, and value sets **SHALL** be present in the resource and constrains how the elements are used. Providing the floor for standards development for specific use cases promotes interoperability and adoption.
      exampleBoolean: false
      name: US Core DeviceRequest Profile
    - reference:
        reference: StructureDefinition/us-core-flag
      description: The US Core Flag Profile inherits from the FHIR Flag resource; refer to it for scope and usage definitions. This profile sets minimum expectations for the Flag resource to record, search, and fetch a patient's reasonable accommodations and other patient-related alerts. It identifies which core elements, extensions, vocabularies, and value sets SHALL be present in the resource when using this profile, and constrains the way those elements are used.
      exampleBoolean: false
      name: US Core Flag Profile
    - reference:
        reference: StructureDefinition/us-core-medicationadministration
      description: The US Core MedicationAdministration Profile inherits from the FHIR [MedicationAdministration](https://hl7.org/fhir/R4/medicationadministration.html) resource; refer to it for scope and usage definitions. This profile meets the requirements of the U.S. Core Data for Interoperability (USCDI) *Medication Administration Data Element of the Medications Data Class*. It sets minimum expectations for the MedicationAdministration resource to record, search, and fetch information about medications administered to a patient. It specifies which core elements, extensions, vocabularies, and value sets **SHALL** be present in the resource and constrains how the elements are used. Providing the floor for standards development for specific use cases promotes interoperability and adoption.
      exampleBoolean: false
      name: US Core MedicationAdministration Profile
    - reference:
        reference: StructureDefinition/us-core-nutritionorder
      description: The US Core Nutrition Order Profile inherits from the FHIR [NutritionOrder](https://hl7.org/fhir/R4/nutritionorder.html) resource; refer to it for scope and usage definitions. This profile meets the requirements of the U.S. Core Data for Interoperability (USCDI) *Nutrition Order Data Element of the Orders Data Class*. It sets minimum expectations for the NutriotionOrder resource to record, search, and fetch nutritional orders for a patient It specifies which core elements, extensions, vocabularies, and value sets **SHALL** be present in the resource and constrains how the elements are used. Providing the floor for standards development for specific use cases promotes interoperability and adoption.
      exampleBoolean: false
      name: US Core Nutrition Order Profile
    - reference:
        reference: StructureDefinition/us-core-observation-accommodation
      description: The US Core Observation Patient Accommodation Profile inherits from the FHIR [Observation](https://hl7.org/fhir/R4/observation.html) resource; refer to it for scope and usage definitions. This profile meets the requirements of the U.S. Core Data for Interoperability (USCDI) *Accommodation Data Element of the Patient Demographics/Information Data Class*. It sets minimum expectations for the Observation resource to record, search, and fetch information about modifications, tools, technologies, and other supports necessary to enable a patient to access care. Examples include, but are not limited to, sign language interpreters, wheelchair accessibility requirements, and sensory accommodation. It specifies which core elements, extensions, vocabularies, and value sets **SHALL** be present in the resource and constrains how the elements are used. Providing the floor for standards development for specific use cases promotes interoperability and adoption.
      exampleBoolean: false
      name: US Core Observation Patient Accommodation Profile
    - reference:
        reference: ValueSet/us-core-patient-contact-relationship
      description: Codes that represent the relationship of a person identified as a contact for a patient, including roles supporting the USCDI v7 *Healthcare Agent* Data Element. Combines the FHIR PatientContactRelationship value set with selected HL7, SNOMED CT, and LOINC codes covering healthcare power-of-attorney and primary / alternate healthcare agent designations.
      exampleBoolean: false
      name: US Core Patient Contact Relationship
    - reference:
        reference: StructureDefinition/us-core-patient
      description: The US Core Patient Profile inherits from the FHIR [Patient](https://hl7.org/fhir/R4/patient.html) resource; refer to it for scope and usage definitions. This profile meets the requirements of the [U.S. Core Data for Interoperability (USCDI)](https://www.healthit.gov/isp/united-states-core-data-interoperability-uscdi) *Patient Demographics/Information* Data Class. It sets minimum expectations for the Patient resource to record, search, and fetch basic demographics and other administrative information about an individual patient. It specifies which core elements, extensions, vocabularies, and value sets **SHALL** be present and constrains how the elements are used. Providing the floor for standards development for specific use cases promotes interoperability and adoption.
      exampleBoolean: false
      name: US Core Patient Profile
    - reference:
        reference: Observation/accommodation-wheelchair
      description: This example of a *US Core Observation Patient Accommodation Profile* records that the patient needs staff assistance with pushing a wheelchair during clinical encounters.
      name: Wheelchair Assistance Accommodation Observation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-observation-accommodation
      groupingId: Observation
    - reference:
        reference: Observation/simple-accommodation-wheelchair
      description: This example of a *US Core Simple Observation Profile* records that the patient needs staff assistance with pushing a wheelchair during clinical encounters.
      name: Wheelchair Assistance Accommodation Simple Observation Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-simple-observation
      groupingId: Observation
    - reference:
        reference: Flag/flag-wheelchair-assist
      description: This example of a *US Core Flag Profile* illustrates a patient accommodation indicating that staff assistance with pushing a wheelchair is needed during clinical encounters.
      name: Wheelchair Assistance Flag Example
      exampleCanonical: http://hl7.org/fhir/us/core/StructureDefinition/us-core-flag
      groupingId: Flag
